<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Wildlife Donor Impact</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Stylesheets (Variables only) -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../assets/images/favicon.png">

    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(27, 67, 50, 0.9), rgba(27, 67, 50, 0.9)), url('../assets/images/hero.png');
            background-size: cover;
            background-position: center;
            color: var(--text-color);
            padding: 20px;
        }

        .auth-card {
            background: var(--white);
            padding: 40px;
            border-radius: 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .auth-header { margin-bottom: 30px; }
        .auth-header p { text-align: center; font-weight: 600; color: var(--primary-color); }

        .form-group { margin-bottom: 15px; text-align: left; }
        .form-control { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; background: #f9f9f9; }
        
        .social-auth { margin-top: 25px; display: flex; flex-direction: column; gap: 12px; }
        
        .btn-google {
            background: #ffffff;
            color: #d63031;
            border: 1px solid #d63031;
            font-weight: 600;
            padding: 12px 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s ease;
        }

        .btn-google:hover {
            background: #fdf2f2;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(214, 48, 49, 0.1);
        }

        .btn-email-alt {
            background: #f1f2f6;
            color: #2f3542;
            border: 1px solid transparent;
            font-weight: 600;
            padding: 12px 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s ease;
        }

        .btn-email-alt:hover {
            background: #e2e4e9;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .auth-links { margin-top: 20px; font-size: 0.9rem; color: var(--text-light); }
        .auth-links a { color: var(--primary-color); font-weight: 600; text-decoration: underline; }

        .forgot-password { text-align: right; margin-top: 5px; font-size: 0.85rem; }
        .forgot-password a { color: var(--text-light); }

        /* 🔥 DARK MODE OVERRIDES */
        [data-theme="dark"] .auth-card { background-color: #0c1d17; border: 1px solid rgba(255,255,255,0.05); }
        [data-theme="dark"] .auth-header p { color: #52B788 !important; }
        [data-theme="dark"] .auth-links, [data-theme="dark"] .auth-links a { color: #c8d8d0; }
        [data-theme="dark"] .auth-links a { color: #D4A373 !important; }
        [data-theme="dark"] .forgot-password a { color: #a8c4b8; }
        [data-theme="dark"] label { color: #ffffff; }

        [data-theme="dark"] .btn-primary { 
            background-color: #52B788 !important; 
            color: #0c1d17 !important; 
            font-weight: 700;
        }
        [data-theme="dark"] .btn-primary:hover { background-color: #D4A373 !important; }
        [data-theme="dark"] .btn-email-alt { background-color: #1a3227; color: #ffffff; }
        [data-theme="dark"] .btn-email-alt:hover { background-color: #244134; }
        [data-theme="dark"] .btn-google:hover { background-color: #f8f9fa; }

        /* 🔥 MOBILE FIX (360px) */
        @media (max-width: 480px) {
            .auth-card { padding: 30px 20px; border-radius: 20px; }
            .auth-header h1 { font-size: 1.5rem; }
            .navbar { height: 70px; }
        }
    </style>
</head>
<body class="auth-page">
    <nav class="navbar">
        <div class="container navbar-content" style="justify-content: center;">
            <a href="index.html" class="brand">
                <img src="../assets/images/favicon.png" alt="Wildlife" class="brand-logo">
                <span class="brand-text">Wildlife</span>
            </a>
        </div>
    </nav>
    <div class="auth-card">
        <div class="auth-header">
            <p>Welcome back to the frontlines.</p>
        </div>

        <form action="dashboard.html">
            <div class="form-group">
                <label for="email">Donor Email</label>
                <input type="email" id="email" class="form-control" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                <div class="forgot-password">
                    <a href="forgot-password.html">Forgot Password?</a>
                </div>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 15px;">Login Now</button>
        </form>

        <div class="social-auth">
            <div style="display: flex; align-items: center; gap: 10px; margin: 10px 0;">
                <hr style="flex:1; border:0; border-top:1px solid #ddd;">
                <span style="font-size: 0.8rem; color: #999;">OR SIGN IN WITH</span>
                <hr style="flex:1; border:0; border-top:1px solid #ddd;">
            </div>
            <button class="btn-google">
                <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" height="20" alt="Google">
                Google
            </button>
            <button class="btn-email-alt">
                <i class="fas fa-envelope"></i> Email
            </button>
        </div>

        <div class="auth-links">
            <p>Don't have an account? <a href="register.html">Sign Up</a></p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../assets/js/main.js"></script>
</body>
</html>
