<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donor Dashboard - Wildlife Impact Hub</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Base Variables -->
    <link rel="stylesheet" href="../assets/css/style.css">
    
    <style>
        :root {
            --sidebar-width: 260px;
            --dash-bg: #f0f4f3;
            --dash-card: #ffffff;
            --dash-primary: #1b4332;
        }

        body {
            background-color: var(--dash-bg);
            margin: 0;
            font-family: var(--font-body);
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--dash-primary);
            color: white;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
            z-index: 1001;
            transition: 0.3s;
        }

        .sidebar .logo { color: white; margin-bottom: 50px; }
        
        .sidebar-brand-box {
            background-color: #f8faf9;
            margin: -30px -20px 30px -20px;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .side-nav { flex: 1; }
        .side-nav-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: 0.3s;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
        }

        .side-nav-item:hover, .side-nav-item.active {
            background-color: rgba(255,255,255,0.1);
            color: white;
        }

        .side-nav-item i { font-size: 1.25rem; }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            padding: 30px;
            transition: 0.3s;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            background: white;
            padding: 15px 30px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .user-profile { display: flex; align-items: center; gap: 15px; }
        .user-avatar { width: 45px; height: 45px; border-radius: 50%; background: var(--accent-color); display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }

        /* Dashboard Grid */
        .dash-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        .dash-card {
            background: var(--dash-card);
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            margin-bottom: 30px;
        }

        .dash-card h3 { text-align: left; margin: 0 0 20px; }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
        }

        .stat-item {
            text-align: center;
            padding: 20px;
            background: #f8faf9;
            border-radius: 20px;
        }

        .stat-item h2 { color: var(--accent-color); margin: 0; }
        .stat-item p { margin: 5px 0 0; font-size: 0.9rem; color: #777; }

        /* Virtual Patrol */
        .patrol-feed { display: flex; flex-direction: column; gap: 15px; }
        .patrol-item {
            display: flex;
            gap: 15px;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        .patrol-item:last-child { border: none; }
        .patrol-img { width: 60px; height: 60px; border-radius: 12px; object-fit: cover; }
        .patrol-text h4 { margin: 0; text-align: left; font-size: 1rem; }
        .patrol-text small { color: #999; }

        /* Recurring Donations */
        .donation-status {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: #eef7f2;
            border-radius: 15px;
            border-left: 5px solid var(--accent-color);
        }

        @media (max-width: 1024px) {
            .dash-grid { grid-template-columns: 1fr; }
        }
        
        .hamburger-dash { display: none; cursor: pointer; font-size: 1.5rem; color: var(--dash-primary); margin-right: 15px; }

        @media (max-width: 768px) {
            .hamburger-dash { display: block; }
            .sidebar { 
                left: -100%; 
                width: 260px; 
                box-shadow: 10px 0 30px rgba(0,0,0,0.1);
            }
            .sidebar.active { left: 0; }
            .main-content { margin-left: 0; padding: 20px; }
            
            .sidebar-overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.5);
                z-index: 1000;
            }
            .sidebar-overlay.active { display: block; }
            
            .top-bar { padding: 10px 20px; margin-bottom: 20px; }
            .top-bar h2 { font-size: 1.25rem; }
        }
        [data-theme="dark"] body {
            --dash-bg: #121212;
            --dash-card: #0c1d17;
            --dash-primary: #e8f5e9;
            color: #ffffff;
        }
        [data-theme="dark"] .sidebar, [data-theme="dark"] .sidebar-brand-box {
            background-color: var(--dash-primary);
        }
        [data-theme="dark"] .sidebar-brand-box { border-bottom: 1px solid rgba(27, 67, 50, 0.1); }
        [data-theme="dark"] .side-nav-item { color: #1b4332; }
        [data-theme="dark"] .side-nav-item:hover, [data-theme="dark"] .side-nav-item.active {
            background-color: rgba(27, 67, 50, 0.1); color: #1b4332; font-weight: 700;
        }
        [data-theme="dark"] .top-bar { background-color: var(--dash-card); color: #ffffff; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        [data-theme="dark"] .top-bar h2, [data-theme="dark"] .hamburger-dash { color: #ffffff; }
        [data-theme="dark"] .dash-card { background: var(--dash-card); border: 1px solid rgba(255,255,255,0.05); color: #ffffff; }
        [data-theme="dark"] .dash-card h3 { color: var(--secondary-color); }
        [data-theme="dark"] .stat-item { background-color: #1a3227; color: #ffffff; }
        [data-theme="dark"] .stat-item p { color: #cccccc; }
        [data-theme="dark"] .donation-status, [data-theme="dark"] .dash-card > div[style*="background"] { background-color: #1a3227 !important; border-color: rgba(255,255,255,0.1) !important; }
        [data-theme="dark"] .patrol-item { border-bottom-color: rgba(255,255,255,0.1); }
        [data-theme="dark"] .patrol-text h4, [data-theme="dark"] .patrol-text p, [data-theme="dark"] .dash-card strong, [data-theme="dark"] label, [data-theme="dark"] table th { color: #ffffff !important; }
        [data-theme="dark"] input { background-color: #1a3227; color: #ffffff; border-color: rgba(255,255,255,0.1) !important; }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand-box">
            <a href="index.html" class="brand center-brand">
                <img src="../assets/images/favicon.png" alt="Wildlife" class="brand-logo">
                <span class="brand-text">Wildlife</span>
            </a>
        </div>

        <nav class="side-nav">
            <a href="dashboard.html" class="side-nav-item">
                <i class="fas fa-th-large"></i>
                <span>Summary</span>
            </a>
            <a href="dash-impact.html" class="side-nav-item">
                <i class="fas fa-heart"></i>
                <span>Impact Hub</span>
            </a>
            <a href="dash-patrol.html" class="side-nav-item">
                <i class="fas fa-video"></i>
                <span>Virtual Patrol</span>
            </a>
            <a href="dash-donations.html" class="side-nav-item">
                <i class="fas fa-credit-card"></i>
                <span>Donations</span>
            </a>
            <a href="dash-settings.html" class="side-nav-item active">
                <i class="fas fa-cog"></i>
                <span>Settings</span>
            </a>
        </nav>

        <div class="side-nav-item" style="margin-top: auto;">
            <a href="index.html" style="display:flex; align-items:center; gap:15px; color:inherit;">
                <i class="fas fa-sign-out-alt"></i>
                <span>Log Out</span>
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="top-bar">
            <div style="display: flex; align-items: center;">
                <div class="hamburger-dash" id="dashHamburger">
                    <i class="fas fa-bars"></i>
                </div>
                <h2 style="margin:0;">Account Settings</h2>
            </div>
            <div class="user-profile">
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode" style="margin-right: 15px; border:none; background:transparent; font-size:1.2rem; cursor:pointer; color:inherit;">
                    <i class="fas fa-moon"></i>
                </button>
                <div class="notifications" style="position:relative; cursor:pointer;">
                    <i class="fas fa-bell" style="font-size: 1.25rem; color: #777;"></i>
                    <span style="position:absolute; top:-5px; right:-5px; background:var(--accent-color); width:15px; height:15px; border-radius:50%; border:2px solid white;"></span>
                </div>
                <div class="user-avatar">J</div>
                
            </div>
        </header>

        <div class="dash-grid" style="grid-template-columns: 1fr;">
            <div class="dash-card">
                <h3>Profile Information</h3>
                <form style="display: grid; gap: 20px; margin-top: 20px;">
                    <div>
                        <label style="display: block; font-size: 0.9rem; font-weight: bold; margin-bottom: 8px;">Full Name</label>
                        <input type="text" value="Jane Doe" style="width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; box-sizing: border-box;">
                    </div>
                    <div>
                        <label style="display: block; font-size: 0.9rem; font-weight: bold; margin-bottom: 8px;">Email Address</label>
                        <input type="email" value="jane@example.com" style="width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; box-sizing: border-box;">
                    </div>
                    <div>
                        <label style="display: block; font-size: 0.9rem; font-weight: bold; margin-bottom: 8px;">Change Password</label>
                        <input type="password" placeholder="••••••••" style="width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; box-sizing: border-box;">
                    </div>
                </form>
            </div>
            
            <div class="dash-card">
                <h3>Communication Preferences</h3>
                <div style="display: grid; gap: 15px; margin-top: 20px;">
                    <label style="display: flex; align-items: center; gap: 15px; font-size: 0.95rem; cursor: pointer;">
                        <input type="checkbox" checked style="width: 18px; height: 18px;"> Require monthly impact reports via Email
                    </label>
                    <label style="display: flex; align-items: center; gap: 15px; font-size: 0.95rem; cursor: pointer;">
                        <input type="checkbox" checked style="width: 18px; height: 18px;"> Allow SMS alerts for urgent poaching rescues
                    </label>
                    <label style="display: flex; align-items: center; gap: 15px; font-size: 0.95rem; cursor: pointer;">
                        <input type="checkbox" style="width: 18px; height: 18px;"> Weekly marketing newsletter
                    </label>
                </div>
            </div>

            <div>
                <button class="btn btn-primary" style="padding: 15px 30px; font-size: 1.1rem;">Save All Changes</button>
            </div>
        </div>
    </main>

    <!-- JS for Dashboard Interactions -->
    <script>
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        const hamburger = document.getElementById('dashHamburger');

        function toggleSidebar() {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        hamburger.addEventListener('click', toggleSidebar);
        overlay.addEventListener('click', toggleSidebar);

        // Close sidebar when clicking links on mobile
        const navItems = document.querySelectorAll('.side-nav-item');
        navItems.forEach(item => {
            item.addEventListener('click', () => {
                if(window.innerWidth <= 768) {
                    toggleSidebar();
                }
            });
        });
    </script>

    <script src="../assets/js/main.js"></script>
</body>
</html>
