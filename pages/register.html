<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Join the Mission</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Stylesheets (Variables only) -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../assets/images/favicon.png?v=2">
    <link rel="shortcut icon" href="../assets/images/favicon.png?v=2" type="image/png">

    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: #ffffff;
            color: var(--text-color);
            transition: var(--transition);
            /* Hide scrollbar but keep functionality */
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        [data-theme="dark"] body {
            background: #05110E;
        }

        body::-webkit-scrollbar {
            display: none;
        }

        .page-controls {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 2000;
        }

        .page-controls .theme-toggle,
        .page-controls .rtl-toggle {
            background: var(--primary-color);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .page-controls .rtl-toggle {
            font-size: 0.85rem;
            font-weight: 700;
            font-family: var(--font-heading);
            width: auto;
            padding: 0 15px;
        }

        .page-controls .theme-toggle:hover,
        .page-controls .rtl-toggle:hover {
            background: var(--accent-color);
            transform: translateY(-2px);
        }

        [data-theme="dark"] .page-controls .theme-toggle,
        [data-theme="dark"] .page-controls .rtl-toggle {
            background: #D4A373;
            color: #05110E;
        }

        [data-theme="dark"] .page-controls .theme-toggle:hover,
        [data-theme="dark"] .page-controls .rtl-toggle:hover {
            background: #ffffff;
        }

        .auth-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 40px;
            width: 100%;
        }

        .auth-card {
            background: var(--white);
            padding: 40px;
            border-radius: 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.1);
            text-align: center;
            position: relative;
            z-index: 10;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .auth-header {
            margin-bottom: 25px;
        }

        .auth-header p {
            text-align: center;
            font-weight: 700;
            color: var(--primary-color);
            font-size: 1.5rem;
            line-height: 1.3;
        }

        .form-group {
            margin-bottom: 12px;
            text-align: left;
        }

        .form-control {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            background: rgba(0, 0, 0, 0.02);
            color: var(--text-color);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            background: white;
        }
        
        .social-auth {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .btn-social {
            background: white;
            color: var(--text-color);
            border: 1px solid rgba(0, 0, 0, 0.1);
            font-weight: 600;
            padding: 12px 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s ease;
        }

        .btn-social:hover {
            background: #f9f9f9;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .terms-group {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin: 15px 0;
            text-align: left;
            font-size: 0.85rem;
        }

        .terms-group input { margin-top: 3px; }
        .auth-links {
            margin-top: 15px;
            font-size: 0.9rem;
            color: var(--text-light);
        }

        .auth-links a {
            color: var(--primary-color);
            font-weight: 600;
            text-decoration: underline;
        }

        /* 🔥 DARK MODE OVERRIDES */
        [data-theme="dark"] .auth-card {
            background-color: #0c1d17;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }

        [data-theme="dark"] .auth-header p {
            color: #52B788 !important;
        }

        [data-theme="dark"] .form-control {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
            color: white;
        }

        [data-theme="dark"] .btn-social {
            background: #1b4332;
            border-color: rgba(255, 255, 255, 0.1);
            color: white;
        }

        [data-theme="dark"] .btn-social:hover {
            background: #2d5a45;
        }

        [data-theme="dark"] .auth-links,
        [data-theme="dark"] .auth-links a {
            color: #c8d8d0;
        }

        [data-theme="dark"] .auth-links a {
            color: #D4A373 !important;
        }

        [data-theme="dark"] label {
            color: #ffffff;
        }

        [data-theme="dark"] .btn-primary {
            background-color: #52B788 !important;
            color: #0c1d17 !important;
            font-weight: 700;
        }

        /* 🔥 MOBILE FIX (360px) */
        @media (max-width: 480px) {
            .page-controls {
                position: absolute;
                top: 50%;
                right: 15px;
                transform: translateY(-50%);
                gap: 5px;
            }

            .page-controls .theme-toggle,
            .page-controls .rtl-toggle {
                width: 26px;
                height: 26px;
                font-size: 0.75rem;
                border-radius: 6px;
            }

            .page-controls .rtl-toggle {
                padding: 0 6px;
                font-size: 0.6rem;
            }

            .auth-card {
                padding: 30px 20px;
                border-radius: 20px;
            }

            .auth-header p {
                font-size: 1.25rem;
            }

            .navbar {
                height: 70px;
            }
        }
    </style>
</head>

<body class="auth-page">
    <nav class="navbar">
        <div class="container navbar-content" style="justify-content: center; position: relative;">
            <a href="index.html" class="brand">
                <img src="../assets/images/favicon.png" alt="Wildlife" class="brand-logo">
                <span class="brand-text">Wildlife</span>
            </a>
            <div class="page-controls">
                <button class="rtl-toggle-main rtl-toggle">RTL</button>
                <div class="theme-toggle">
                    <i class="fas fa-moon"></i>
                </div>
            </div>
        </div>
    </nav>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <p>Every donor makes impact.</p>
            </div>

            <form action="dashboard.html">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" class="form-control" placeholder="" required>
                </div>
                <div class="form-group">
                    <label for="email">Donor Email</label>
                    <input type="email" id="email" class="form-control" placeholder="" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="" required>
                </div>

                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" class="form-control" placeholder="" required>
                </div>

                <div class="terms-group">
                    <input type="checkbox" id="terms" required checked>
                    <label for="terms">I accept the Terms & Conditions.</label>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 15px;">Register Now</button>
            </form>

            <div class="social-auth">
                <div style="display: flex; align-items: center; gap: 10px; margin: 10px 0;">
                    <hr style="flex:1; border:0; border-top:1px solid rgba(0,0,0,0.1);">
                    <span style="font-size: 0.8rem; color: #999;">OR SIGN UP WITH</span>
                    <hr style="flex:1; border:0; border-top:1px solid rgba(0,0,0,0.1);">
                </div>
                <button class="btn-social">
                    <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" height="20" alt="Google">
                    Continue with Google
                </button>
                <button class="btn-social">
                    <i class="fab fa-apple" style="font-size: 1.2rem;"></i> Continue with Apple
                </button>
            </div>

            <div class="auth-links">
                <p>Already a donor? <a href="login.html">Login</a></p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../assets/js/main.js"></script>
</body>

</html>
