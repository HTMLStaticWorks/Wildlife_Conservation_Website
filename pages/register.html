<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Join the Mission</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Stylesheets (Variables only) -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../assets/images/favicon.png?v=2">
    <link rel="shortcut icon" href="../assets/images/favicon.png?v=2" type="image/png">

    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(rgba(27, 67, 50, 0.9), rgba(27, 67, 50, 0.9)), url('../assets/images/hero.png');
            background-size: cover;
            background-position: center;
            color: var(--text-color);
            /* Hide scrollbar but keep functionality */
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        body::-webkit-scrollbar {
            display: none;
        }

        .auth-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 40px; /* Padding-top to avoid header */
            width: 100%;
        }

        .auth-card {
            background: var(--white);
            padding: 40px;
            border-radius: 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .auth-header { margin-bottom: 25px; }
        .auth-header p { text-align: center; font-weight: 700; color: var(--primary-color); font-size: 1.5rem; line-height: 1.3; }

        .form-group { margin-bottom: 12px; text-align: left; }
        .form-control { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; background: #f9f9f9; }
        
        .social-auth { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        .btn-google {
            background: #ffffff;
            color: #d63031;
            border: 1px solid #d63031;
            font-weight: 600;
            padding: 12px 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s ease;
        }

        .btn-google:hover {
            background: #fdf2f2;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(214, 48, 49, 0.1);
        }

        .btn-email-alt {
            background: #ffffff;
            color: #000000;
            border: 1px solid #ddd;
            font-weight: 600;
            padding: 12px 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s ease;
        }

        .btn-email-alt:hover {
            background: #e2e4e9;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .btn-apple {
            background: #ffffff;
            color: #000000;
            border: 1px solid #000000;
            font-weight: 600;
            padding: 12px 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s ease;
        }

        .btn-apple:hover {
            background: #f5f5f5;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.10);
        }

        .terms-group {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin: 15px 0;
            text-align: left;
            font-size: 0.85rem;
        }

        .terms-group input { margin-top: 3px; }
        .auth-links { margin-top: 15px; font-size: 0.9rem; color: var(--text-light); }
        .auth-links a { color: var(--primary-color); font-weight: 600; text-decoration: underline; }

        /* 🔥 DARK MODE OVERRIDES */
        [data-theme="dark"] .auth-card { background-color: #0c1d17; border: 1px solid rgba(255,255,255,0.05); }
        [data-theme="dark"] .auth-header p { color: #52B788 !important; }
        [data-theme="dark"] .auth-links, [data-theme="dark"] .auth-links a { color: #c8d8d0; }
        [data-theme="dark"] .auth-links a { color: #D4A373 !important; }
        [data-theme="dark"] label { color: #ffffff; }

        [data-theme="dark"] .btn-primary { 
            background-color: #52B788 !important; 
            color: #0c1d17 !important; 
            font-weight: 700;
        }
        [data-theme="dark"] .btn-primary:hover { background-color: #D4A373 !important; }
        [data-theme="dark"] .btn-email-alt { background-color: #ffffff; color: #000000; border-color: #ddd; }
        [data-theme="dark"] .btn-email-alt:hover { background-color: #f5f5f5; }
        [data-theme="dark"] .btn-google:hover { background-color: #f8f9fa; }
        [data-theme="dark"] .btn-apple { background-color: #ffffff; color: #000000; border-color: #000000; }
        [data-theme="dark"] .btn-apple:hover { background-color: #e0e0e0; }

        /* 🔥 MOBILE FIX (360px) */
        @media (max-width: 480px) {
            .auth-card { padding: 30px 20px; border-radius: 20px; }
            .auth-header p { font-size: 1.25rem; }
            .navbar { height: 70px; }
            .auth-wrapper { padding-top: 90px; }
        }
    </style>
</head>
<body class="auth-page">
    <nav class="navbar">
        <div class="container navbar-content" style="justify-content: center; position: relative;">
            <a href="index.html" class="brand">
                <img src="../assets/images/favicon.png" alt="Wildlife" class="brand-logo">
                <span class="brand-text">Wildlife</span>
            </a>
            <div class="nav-actions" style="position: absolute; right: 20px; top: 50%; transform: translateY(-50%); display: flex; align-items: center; gap: 10px;">
                <div class="theme-toggle">
                    <i class="fas fa-moon"></i>
                </div>
                <button class="rtl-toggle-main rtl-toggle">RTL</button>
            </div>
        </div>
    </nav>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <p>Every donor makes impact.</p>
            </div>
    
            <form action="dashboard.html">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" class="form-control" placeholder="Jane Doe" required>
                </div>
                <div class="form-group">
                    <label for="email">Donor Email</label>
                    <input type="email" id="email" class="form-control" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
    
                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" class="form-control" placeholder="••••••••" required>
                </div>
    
                <div class="terms-group">
                    <input type="checkbox" id="terms" required checked>
                    <label for="terms">I accept the Terms & Conditions.</label>
                </div>
    
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 15px;">Register Now</button>
            </form>
    
            <div class="social-auth">
                <div style="display: flex; align-items: center; gap: 10px; margin: 10px 0;">
                    <hr style="flex:1; border:0; border-top:1px solid #ddd;">
                    <span style="font-size: 0.8rem; color: #999;">OR SIGN UP WITH</span>
                    <hr style="flex:1; border:0; border-top:1px solid #ddd;">
                </div>
                <button class="btn-google">
                    <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" height="20" alt="Google">
                    Continue with Google
                </button>
                <button class="btn-apple">
                    <i class="fab fa-apple" style="font-size: 1.2rem;"></i> Continue with Apple
                </button>
                <button class="btn-email-alt">
                    <i class="fas fa-envelope"></i> Continue with Email
                </button>
            </div>
    
            <div class="auth-links">
                <p>Already a donor? <a href="login.html">Login</a></p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../assets/js/main.js"></script>
</body>
</html>
